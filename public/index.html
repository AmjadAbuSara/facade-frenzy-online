<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facade Frenzy - Online</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            margin: 0; overflow: hidden; background-color: #0f172a; color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        h1 { margin: 0 0 20px 0; color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        canvas { box-shadow: 0 10px 40px rgba(0,0,0,0.9); border-radius: 12px; display: none; }
        .screen { background-color: #1e293b; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); text-align: center; border: 2px solid #334155; width: 450px; }
        .input-group { margin-bottom: 20px; }
        input[type="text"] { width: 80%; padding: 12px; margin-top: 8px; border-radius: 8px; border: none; background: #334155; color: white; font-size: 16px; text-align: center; }
        .btn { background-color: #38bdf8; color: #0f172a; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.2s; width: 100%; margin-top: 10px; }
        .btn:hover { background-color: #7dd3fc; transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary { background-color: #334155; color: #f8fafc; }
        .btn-secondary:hover { background-color: #475569; transform: scale(1.05); }
        .mode-btn { font-size: 22px; padding: 25px; margin: 10px 0; }
        #ui { display: none; width: 800px; justify-content: space-around; flex-wrap: wrap; margin-bottom: 15px; color: white; font-weight: bold; direction: ltr; font-size: 16px; }
        .player-score { margin: 5px 15px; }
        .score { color: #facc15; }
        #game-info { width: 100%; text-align: center; margin-bottom: 10px; color: #38bdf8; font-size: 20px;}
        #announcement-screen { display: none; }
        #announce-title { font-size: 32px; color: #38bdf8; margin-bottom: 20px; }
        #announce-text { font-size: 24px; line-height: 1.6; }
        #mode-screen, #local-setup, #online-lobby { display: none; }
        #mode-screen { display: block; }
    </style>
</head>
<body>

    <!-- Mode Selection -->
    <div id="mode-screen" class="screen">
        <h1>Facade Frenzy</h1>
        <h3 style="color:#94a3b8; margin-bottom: 30px;">اختر وضع اللعب</h3>
        <button class="btn mode-btn" onclick="showLocalSetup()">🕹️ Offline Locally</button>
        <button class="btn mode-btn btn-secondary" onclick="showOnlineLobby()">🌐 Online (Demo)</button>
    </div>

    <!-- Local Setup -->
    <div id="local-setup" class="screen" style="display:none;">
        <h1 style="font-size:24px;">🕹️ Offline Locally</h1>
        <button class="btn btn-secondary" onclick="showModeScreen()" style="margin-bottom:20px; font-size:14px;">← رجوع</button>
        <div class="input-group">
            <label>اللاعب 1 (WASD / Space)</label>
            <input type="text" id="p1-name" placeholder="اللاعب 1" value="اللاعب 1">
        </div>
        <div class="input-group">
            <label>اللاعب 2 (الأسهم / Numpad 0)</label>
            <input type="text" id="p2-name" placeholder="اللاعب 2" value="اللاعب 2">
        </div>
        <p style="color: #fbbf24; font-size: 14px; margin-top: 15px;">🎮 <strong>إضافة لاعبين إضافيين:</strong><br>قم بتوصيل أيدي التحكم (Gamepads) — سيتم اكتشافها تلقائياً!</p>
        <p id="gamepad-count" style="color: #94a3b8; font-size: 13px;"></p>
        <button class="btn" onclick="startLocalSession()">بدء الجلسة المحلية 🏆</button>
    </div>

    <!-- Online Lobby -->
    <div id="online-lobby-panel" class="screen" style="display:none;">
        <h1 style="font-size:24px;">🌐 Online (Demo)</h1>
        <button class="btn btn-secondary" onclick="showModeScreen(); socket.emit('leaveQueue');" style="margin-bottom:20px; font-size:14px;">← رجوع</button>
        <div class="input-group">
            <label>اسمك</label>
            <input type="text" id="online-name" placeholder="اسمك" value="لاعب">
        </div>
        <button class="btn" onclick="joinOnlineMatch()">انضمام للمباراة</button>
        <div id="online-status" style="margin-top: 15px; color: #fbbf24; font-size: 14px;"></div>
        <button class="btn" id="start-online-btn" onclick="startOnlineMatch()" style="display:none;">بدء المباراة 🏆</button>
    </div>

    <!-- Announcement -->
    <div id="announcement-screen" class="screen">
        <div id="announce-title">الجولة 1</div>
        <div id="announce-text">الطور: كلاسيك<br>الخريطة: القاعة الملكية</div>
    </div>

    <!-- Game UI -->
    <div id="ui"><div id="game-info">Status</div></div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>


<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const modeScreen = document.getElementById('mode-screen');
    const localSetup = document.getElementById('local-setup');
    const onlineLobby = document.getElementById('online-lobby-panel');
    const announceScreen = document.getElementById('announcement-screen');
    const uiBar = document.getElementById('ui');

    const socket = io();

    let roomType = null; // 'local' or 'online'
    let serverState = null;
    let localEntities = [];
    let localFootprints = [];
    let localCoin = null;

    // --- UI navigation ---
    function showModeScreen() { hideAll(); modeScreen.style.display = 'block'; }
    function showLocalSetup() { hideAll(); localSetup.style.display = 'block'; }
    function showOnlineLobby() { hideAll(); document.getElementById('online-lobby-panel').style.display = 'block'; }
    function hideAll() {
        modeScreen.style.display = 'none';
        localSetup.style.display = 'none';
        onlineLobby.style.display = 'none';
        announceScreen.style.display = 'none';
    }

    // --- Local session ---
    function startLocalSession() {
        let p1 = document.getElementById('p1-name').value || 'اللاعب 1';
        let p2 = document.getElementById('p2-name').value || 'اللاعب 2';

        // Detect gamepads
        let gpCount = 0;
        const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
        for (let i = 0; i < gamepads.length; i++) { if (gamepads[i]) gpCount++; }

        roomType = 'local';
        socket.emit('startLocalSession', { p1Name: p1, p2Name: p2, gamepadCount: gpCount });
        document.getElementById('online-status').innerText = '⏳ بدء الجلسة...';
    }

    // --- Online match ---
    function joinOnlineMatch() {
        let name = document.getElementById('online-name').value || 'لاعب';
        roomType = 'online';
        socket.emit('joinOnlineMatch', { name });
        document.getElementById('online-status').innerText = '⏳ في طابور الانتظار...';
    }

    function startOnlineMatch() {
        socket.emit('startOnlineMatch');
        document.getElementById('online-status').innerText = '⏳ بدء المباراة...';
    }

    // --- Socket events ---
    socket.on('roomAssigned', (data) => {
        if (data.type === 'local') {
            hideAll();
            document.getElementById('online-status').innerText = `✅ تم بدء الجلسة المحلية!`;
        } else if (data.type === 'online') {
            document.getElementById('online-status').innerText = `✅ انضممت كلاعب رقم ${data.playerId}`;
        }
    });

    socket.on('lobbyCount', (count) => {
        let status = document.getElementById('online-status');
        status.innerText = `⏳ في طابور الانتظار... (${count} لاعب/ين)`;
        let btn = document.getElementById('start-online-btn');
        if (count >= 1) { btn.style.display = 'block'; btn.innerText = `بدء المباراة 🏆 (${count} لاعب/ين)`; }
        else { btn.style.display = 'none'; }
    });

    socket.on('gameState', (state) => {
        serverState = state;
        handleState(state);
    });

    window.addEventListener('keydown', e => { keys[e.code] = true; });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    function captureLocalInputs() {
        // P1
        let p1 = {
            up: !!keys['KeyW'], down: !!keys['KeyS'], left: !!keys['KeyA'], right: !!keys['KeyD'], punch: !!keys['Space']
        };
        // P2
        let p2 = {
            up: !!keys['ArrowUp'] || !!keys['Numpad8'],
            down: !!keys['ArrowDown'] || !!keys['Numpad5'],
            left: !!keys['ArrowLeft'] || !!keys['Numpad4'],
            right: !!keys['ArrowRight'] || !!keys['Numpad6'],
            punch: !!keys['Numpad0']
        };
        // Gamepads
        let gp = {};
        const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
        for (let i = 0; i < gamepads.length; i++) {
            if (gamepads[i]) {
                let g = gamepads[i];
                gp[3 + i] = {
                    up: (g.axes[1] || 0) < -0.3,
                    down: (g.axes[1] || 0) > 0.3,
                    left: (g.axes[0] || 0) < -0.3,
                    right: (g.axes[0] || 0) > 0.3,
                    punch: !!(g.buttons[1]?.pressed)
                };
            }
        }

        socket.emit('localInputs', { 1: p1, 2: p2, ...gp });
    }

    function captureOnlineInput() {
        let input = {
            up: !!keys['KeyW'] || !!keys['ArrowUp'] || !!keys['Numpad8'],
            down: !!keys['KeyS'] || !!keys['ArrowDown'] || !!keys['Numpad5'],
            left: !!keys['KeyA'] || !!keys['ArrowLeft'] || !!keys['Numpad4'],
            right: !!keys['KeyD'] || !!keys['ArrowRight'] || !!keys['Numpad6'],
            punch: !!keys['Space'] || !!keys['Numpad0']
        };

        // Also check gamepad
        const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
        for (let g of gamepads) {
            if (g) {
                if ((g.axes[1] || 0) < -0.3) input.up = true;
                if ((g.axes[1] || 0) > 0.3) input.down = true;
                if ((g.axes[0] || 0) < -0.3) input.left = true;
                if ((g.axes[0] || 0) > 0.3) input.right = true;
                if (g.buttons[1]?.pressed) input.punch = true;
            }
        }

        socket.emit('onlineInput', input);
    }

    // --- State Handling ---
    function handleState(state) {
        if (state.status === 'playing') {
            document.getElementById('online-lobby-panel').style.display = 'none';
        } else {
            document.getElementById('online-lobby-panel').style.display = 'block';
        }

        if (state.phase === 'announcement' && state.announcement) {
            document.getElementById('online-lobby-panel').style.display = 'none';
            announceScreen.style.display = 'block';
            document.getElementById('announce-title').innerText = `الجولة ${state.announcement.round} من ${state.totalRounds}`;
            document.getElementById('announce-text').innerHTML = `الطور: ${state.announcement.modeName}<br><br>الخريطة: ${state.announcement.mapName}`;
            canvas.style.display = 'none'; uiBar.style.display = 'none';
            return;
        } else { announceScreen.style.display = 'none'; }

        if (state.phase === 'lobby') { canvas.style.display = 'none'; uiBar.style.display = 'none'; return; }

        if (state.phase === 'finished') {
            canvas.style.display = 'none'; uiBar.style.display = 'none';
            showModeScreen();
            document.querySelector('#mode-screen h1').innerText = state.winner || 'انتهت البطولة';
            setTimeout(() => { document.querySelector('#mode-screen h1').innerText = 'Facade Frenzy'; }, 5000);
            return;
        }

        currentMode = state.currentMode;
        currentMap = state.currentMap;
        gameOver = state.gameOver;
        localCoin = state.coin;
        localFootprints = state.footprints || [];

        uiBar.style.display = 'flex';
        canvas.style.display = 'block';

        let scoreHTML = `<div id="game-info">${state.message || ''}</div>`;
        state.activePlayers.forEach(p => {
            scoreHTML += `<div class="player-score">${p.name}: <span class="score">${state.scores[p.id] || 0}</span></div>`;
        });
        uiBar.innerHTML = scoreHTML;

        localEntities = state.entities.map(e => {
            let ent = new Entity(e.isPlayer, e.playerNum);
            ent.index = e.index; ent.x = e.x; ent.y = e.y;
            ent.dirX = e.dirX; ent.dirY = e.dirY;
            ent.isPunching = e.isPunching; ent.punchTimer = e.punchTimer;
            ent.dead = e.dead; ent.stunTimer = e.stunTimer; ent.color = e.color;
            return ent;
        });

        if (currentMode && currentMode.id === 'survival' && !gameOver) {
            document.getElementById('game-info').innerText = `الصياد يبحث! | الوقت: ${Math.ceil(state.survivalTimer / 60)} ثانية`;
        }

        if (state.phase === 'playing' && !renderLoopRunning) {
            renderLoopRunning = true;
            requestAnimationFrame(renderLoop);
        }
    }

    // ---- Entity class (render-only - DO NOT MODIFY) ----
    let keys = {};
    let currentMode = null;
    let currentMap = null;
    let gameOver = false;
    let renderLoopRunning = false;
    let frameCount = 0;

    class Entity {
        constructor(isPlayer, playerNum) {
            this.radius = 12; this.isPlayer = isPlayer; this.playerNum = playerNum; this.color = '#334155';
            this.x = 0; this.y = 0; this.dirX = 0; this.dirY = 1;
            this.isPunching = false; this.punchTimer = 0; this.dead = false; this.stunTimer = 0;
        }

        drawAgent(ctx, color, isReflection = false) {
            ctx.save();
            ctx.translate(this.x, this.y);

            if (currentMap && currentMap.isDisco && this.isPlayer && !isReflection) {
                let under = false;
                for (let s of (currentMap.spotlights || [])) {
                    if (Math.hypot(this.x - s.x, this.y - s.y) < s.radius) { under = true; break; }
                }
                if (under) { ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 20; ctx.shadowOffsetX = 10; ctx.shadowOffsetY = 10; }
            }

            if (!isReflection && !this.dead) {
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.beginPath(); ctx.ellipse(0, 15, 12, 6, 0, 0, Math.PI * 2); ctx.fill();
            }

            ctx.lineWidth = 3; ctx.strokeStyle = '#0f172a'; ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(0, -8, 12, Math.PI, 0);
            ctx.lineTo(12, 8); ctx.arc(0, 8, 12, 0, Math.PI); ctx.closePath(); ctx.fill(); ctx.stroke();

            ctx.fillStyle = '#7dd3fc';
            let vx = this.dirX * 6, vy = -4 + (this.dirY * 4);
            ctx.beginPath(); ctx.arc(vx, vy, 6, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

            let time = Date.now() / 120;
            let legAnim = (this.dirX === 0 && this.dirY === 0 || this.stunTimer > 0) ? 0 : Math.sin(time) * 4;
            ctx.beginPath(); ctx.moveTo(-5, 18); ctx.lineTo(-5, 24 + legAnim);
            ctx.moveTo(5, 18); ctx.lineTo(5, 24 - legAnim); ctx.stroke();

            if (this.isPunching) {
                ctx.beginPath(); ctx.moveTo(vx, vy + 4); ctx.lineTo(this.dirX * 30, this.dirY * 30);
                ctx.lineWidth = 6; ctx.stroke();
                ctx.beginPath(); ctx.arc(this.dirX * 30, this.dirY * 30, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#ef4444'; ctx.fill(); ctx.stroke();
            }
            ctx.restore();
        }

        draw(ctx) {
            if (this.dead) {
                ctx.save(); ctx.translate(this.x, this.y);
                ctx.fillStyle = 'rgba(239, 68, 68, 0.4)';
                ctx.beginPath(); ctx.ellipse(0, 5, 20, 10, 0, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(-10, 10); ctx.lineTo(10, 20);
                ctx.moveTo(10, 10); ctx.lineTo(-10, 20); ctx.stroke();
                ctx.restore(); return;
            }
            let c = this.stunTimer > 0 ? '#94a3b8' : this.color;
            this.drawAgent(ctx, c, false);
        }

        drawReflection(ctx, mirrorType) {
            if (this.dead || this.isPlayer) return;
            ctx.save();
            let distance, refY;
            if (mirrorType === 'top') { distance = this.y - MIRROR_SIZE; refY = MIRROR_SIZE - distance; }
            else { distance = (canvas.height - MIRROR_SIZE) - this.y; refY = (canvas.height - MIRROR_SIZE) + distance; }
            let originalY = this.y;
            this.y = refY + 15;
            this.drawAgent(ctx, 'rgba(51, 65, 85, 0.6)', true);
            this.y = originalY;
            ctx.restore();
        }
    }

    const MIRROR_SIZE = 90;

    function drawMirror(type) {
        let yPos = type === 'top' ? 0 : canvas.height - MIRROR_SIZE;
        ctx.fillStyle = '#475569'; ctx.fillRect(0, yPos, canvas.width, MIRROR_SIZE);
        ctx.fillStyle = '#bae6fd'; ctx.fillRect(10, yPos + 10, canvas.width - 20, MIRROR_SIZE - 20);
        ctx.save(); ctx.beginPath();
        ctx.rect(10, yPos + 10, canvas.width - 20, MIRROR_SIZE - 20); ctx.clip();
        localEntities.forEach(e => e.drawReflection(ctx, type));
        ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
        ctx.fillRect(10, yPos + 10, canvas.width - 20, MIRROR_SIZE - 20); ctx.restore();
        ctx.fillStyle = '#1e293b';
        if (type === 'top') ctx.fillRect(0, MIRROR_SIZE, canvas.width, 5);
        else ctx.fillRect(0, canvas.height - MIRROR_SIZE - 5, canvas.width, 5);
    }

    function renderLoop() {
        renderLoopRunning = false;
        frameCount++;

        if (roomType === 'local') captureLocalInputs();
        else if (roomType === 'online') captureOnlineInput();

        if (!currentMap) return;

        ctx.fillStyle = currentMap.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (currentMap.hasTop) drawMirror('top');
        if (currentMap.hasBottom) drawMirror('bottom');

        if (currentMap.spotlights) {
            for (let s of currentMap.spotlights) {
                let grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.radius);
                grad.addColorStop(0, 'rgba(255, 255, 200, 0.25)');
                grad.addColorStop(0.5, 'rgba(255, 255, 200, 0.08)');
                grad.addColorStop(1, 'rgba(255, 255, 200, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2); ctx.fill();
            }
        }

        if (currentMap.walls) {
            ctx.fillStyle = '#3a3a3a';
            for (let w of currentMap.walls) {
                ctx.fillRect(w.x, w.y, w.w, w.h);
                ctx.fillStyle = '#555'; ctx.fillRect(w.x + 2, w.y + 2, w.w - 4, 4);
                ctx.fillStyle = '#3a3a3a';
            }
        }

        if (currentMap.checkpoints) {
            for (let cp of currentMap.checkpoints) {
                ctx.fillStyle = '#4a4a4a';
                ctx.fillRect(cp.x - 6, cp.y + 2, 6, cp.h - 4);
                ctx.fillRect(cp.x + cp.w, cp.y + 2, 6, cp.h - 4);
                if (cp.flashTimer > 0) {
                    ctx.fillStyle = cp.flashColor;
                    ctx.globalAlpha = 0.6 + Math.sin(frameCount * 0.5) * 0.3;
                    ctx.fillRect(cp.x, cp.y, cp.w, cp.h);
                    ctx.globalAlpha = 1;
                } else {
                    ctx.fillStyle = 'rgba(255,255,255,0.04)';
                    ctx.fillRect(cp.x, cp.y, cp.w, cp.h);
                }
            }
        }

        if (currentMap.belts) {
            for (let b of currentMap.belts) {
                ctx.fillStyle = '#5a5a5a';
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.strokeStyle = '#666'; ctx.lineWidth = 2;
                let offset = (frameCount * b.speed * 0.5) % 30;
                for (let x = b.x + offset - 30; x < b.x + b.w; x += 30) {
                    ctx.beginPath();
                    if (b.dirX > 0) { ctx.moveTo(x, b.y + b.h * 0.5 - 8); ctx.lineTo(x + 12, b.y + b.h * 0.5); ctx.lineTo(x, b.y + b.h * 0.5 + 8); }
                    else { ctx.moveTo(x + 12, b.y + b.h * 0.5 - 8); ctx.lineTo(x, b.y + b.h * 0.5); ctx.lineTo(x + 12, b.y + b.h * 0.5 + 8); }
                    ctx.stroke();
                }
                ctx.fillStyle = '#666';
                ctx.fillRect(b.x, b.y, b.w, 3); ctx.fillRect(b.x, b.y + b.h - 3, b.w, 3);
            }
        }

        if (currentMap.isSnow) {
            if (currentMap.snowPatches) {
                ctx.fillStyle = '#f8fafc';
                for (let p of currentMap.snowPatches) {
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(p.x + 5, p.y + 5, p.w - 10, 4);
                    ctx.fillStyle = '#f8fafc';
                }
            }
            for (let f of localFootprints) {
                ctx.fillStyle = `rgba(180, 190, 200, ${f.timer / 160})`;
                ctx.beginPath(); ctx.ellipse(f.x, f.y, 3, 4, 0, 0, Math.PI * 2); ctx.fill();
            }
        }

        if (localCoin && !gameOver) {
            ctx.beginPath(); ctx.arc(localCoin.x, localCoin.y, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#fbbf24'; ctx.fill();
            ctx.lineWidth = 3; ctx.strokeStyle = '#b45309'; ctx.stroke();
        }

        localEntities.sort((a, b) => a.y - b.y);
        localEntities.forEach(e => e.draw(ctx));

        if (currentMap.isDark) {
            ctx.save(); ctx.beginPath();
            ctx.rect(0, 0, canvas.width, canvas.height);
            localEntities.forEach(e => {
                if (!e.dead && e.isPlayer) { ctx.moveTo(e.x + 120, e.y); ctx.arc(e.x, e.y, 120, 0, Math.PI * 2, true); }
            });
            ctx.fillStyle = 'rgba(10, 15, 25, 0.96)'; ctx.fill();
            ctx.restore();
        }

        if (serverState && serverState.phase === 'playing') {
            renderLoopRunning = true;
            requestAnimationFrame(renderLoop);
        }
    }

    // --- Gamepad polling for local setup screen ---
    setInterval(() => {
        let el = document.getElementById('gamepad-count');
        if (!el) return;
        const pads = navigator.getGamepads ? navigator.getGamepads() : [];
        let count = 0;
        for (let p of pads) { if (p) count++; }
        el.innerText = count > 0 ? `تم الكشف عن ${count} يد(أي) تحكم` : 'لم يتم الكشف عن أي يد تحكم';
    }, 500);

    console.log('Facade Frenzy Online loaded');
</script>
</body>
</html>
